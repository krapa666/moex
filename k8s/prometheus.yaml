apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: moex
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: moex-backend
        metrics_path: /metrics
        static_configs:
          - targets: ['backend:8000']

      - job_name: moex-infra
        metrics_path: /metrics
        static_configs:
          - targets:
              - 'prometheus:9090'
              - 'loki:3100'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: moex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.external-url=http://junibox/prometheus/
            - --web.route-prefix=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: moex
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
