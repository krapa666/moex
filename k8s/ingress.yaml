apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moex-ingress
  namespace: moex
spec:
  ingressClassName: nginx
  rules:
    - host: junibox
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
