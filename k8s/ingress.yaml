apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moex-ingress
  namespace: moex
spec:
  ingressClassName: nginx
  rules:
    - host: junibox
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
