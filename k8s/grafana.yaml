apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: moex
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090/prometheus
        isDefault: true

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: moex
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: MOEX dashboards
        folder: MOEX
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards-json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-moex
  namespace: moex
data:
  moex-home-and-app-overview.json: |
    {
      "title": "MOEX App Operations Overview",
      "uid": "moex-home-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "type": "stat",
          "title": "Backend Up",
          "id": 1,
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "max(up{job='moex-backend'})", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "Backend RPS",
          "id": 2,
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(rate(http_requests_total{job='moex-backend'}[5m]))", "refId": "A", "legendFormat": "RPS"}]
        },
        {
          "type": "timeseries",
          "title": "Backend 5xx",
          "id": 3,
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(rate(http_requests_total{job='moex-backend',status=~'5..'}[5m]))", "refId": "A", "legendFormat": "5xx"}]
        },
        {
          "type": "logs",
          "title": "Loki logs",
          "id": 4,
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 8},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"expr": "{job=~\".*\"}", "queryType": "range", "refId": "A"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: moex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.5
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SERVER_ROOT_URL
              value: http://junibox/grafana/
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /etc/grafana/provisioning/dashboards-json/moex-home-and-app-overview.json
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboards-json
              mountPath: /etc/grafana/provisioning/dashboards-json/moex-home-and-app-overview.json
              subPath: moex-home-and-app-overview.json
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards-json
          configMap:
            name: grafana-dashboard-moex
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: moex
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
