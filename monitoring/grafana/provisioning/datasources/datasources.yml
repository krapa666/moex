apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # Prometheus runs with --web.route-prefix=/prometheus in docker-compose,
    # so Grafana must query API under /prometheus/api/v1.
    url: http://prometheus:9090/prometheus
    isDefault: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
