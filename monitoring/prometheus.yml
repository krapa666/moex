global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: moex-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']

  - job_name: moex-infra
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'prometheus:9090'
          - 'loki:3100'
          - 'promtail:9080'
          - 'node-exporter:9100'
