# Nginx reverse-proxy template for Minikube deployment on moex.ddns.net (HTTPS)
upstream moex_minikube_frontend {
    server MINIKUBE_FRONTEND_ENDPOINT;
}

upstream moex_minikube_prometheus {
    server MINIKUBE_PROMETHEUS_ENDPOINT;
}

upstream moex_minikube_grafana {
    server MINIKUBE_GRAFANA_ENDPOINT;
}

upstream moex_minikube_loki {
    server MINIKUBE_LOKI_ENDPOINT;
}

server {
    listen 80;
    server_name SERVER_NAMES_PLACEHOLDER;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name SERVER_NAMES_PLACEHOLDER;

    ssl_certificate SSL_CERT_PATH_PLACEHOLDER;
    ssl_certificate_key SSL_CERT_KEY_PATH_PLACEHOLDER;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    location /prometheus/ {
        proxy_pass http://moex_minikube_prometheus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /grafana/ {
        proxy_pass http://moex_minikube_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /loki/ {
        rewrite ^/loki/(.*)$ /$1 break;
        proxy_pass http://moex_minikube_loki;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://moex_minikube_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
