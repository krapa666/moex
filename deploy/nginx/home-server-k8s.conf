# Nginx reverse-proxy template for Minikube deployment on junibox.
#
# Рекомендуемый способ генерации рабочего конфига:
#   sudo ./scripts/configure-nginx-k8s-proxy.sh --reload
#
# Скрипт подставляет доступные endpoint'ы вместо:
# - MINIKUBE_FRONTEND_ENDPOINT
# - MINIKUBE_PROMETHEUS_ENDPOINT
# - MINIKUBE_GRAFANA_ENDPOINT
# - MINIKUBE_LOKI_ENDPOINT

# Use frontend NodePort endpoint selected by script:
# - 127.0.0.1:30080 (preferred, via `kubectl port-forward` started by minikube-up)
# - MINIKUBE_IP:30080 fallback when localhost endpoint is unavailable.
upstream moex_minikube_frontend {
    server MINIKUBE_FRONTEND_ENDPOINT;
}

upstream moex_minikube_prometheus {
    server MINIKUBE_PROMETHEUS_ENDPOINT;
}

upstream moex_minikube_grafana {
    server MINIKUBE_GRAFANA_ENDPOINT;
}

upstream moex_minikube_loki {
    server MINIKUBE_LOKI_ENDPOINT;
}

server {
    listen 80 default_server;
    server_name junibox _;

    # Safer defaults for internet-exposed reverse proxy.
    client_max_body_size 20m;
    keepalive_timeout 65;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /prometheus/ {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://moex_minikube_prometheus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /grafana/ {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://moex_minikube_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /loki/ {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        rewrite ^/loki/(.*)$ /$1 break;
        proxy_pass http://moex_minikube_loki;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location / {
        proxy_pass http://moex_minikube_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
