# Nginx reverse-proxy template for Minikube deployment on junibox.
#
# Рекомендуемый способ генерации рабочего конфига:
#   sudo ./scripts/configure-nginx-k8s-proxy.sh --reload
#
# Скрипт подставляет доступный endpoint вместо MINIKUBE_FRONTEND_ENDPOINT.

# Use frontend NodePort endpoint selected by script:
# - 127.0.0.1:30080 (preferred, via `kubectl port-forward` started by minikube-up)
# - MINIKUBE_IP:30080 fallback when localhost endpoint is unavailable.
upstream moex_minikube_frontend {
    server MINIKUBE_FRONTEND_ENDPOINT;
}

server {
    listen 80;
    server_name junibox;

    location / {
        proxy_pass http://moex_minikube_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
