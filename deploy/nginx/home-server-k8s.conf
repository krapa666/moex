# Nginx reverse-proxy template for Minikube deployment on junibox.
#
# Рекомендуемый способ генерации рабочего конфига:
#   sudo ./scripts/configure-nginx-k8s-proxy.sh --reload
#
# Скрипт подставляет актуальный minikube ip вместо MINIKUBE_IP.

# Use frontend NodePort to avoid ingress reachability issues on some Minikube drivers
# (for example docker driver on Linux/WSL where MINIKUBE_IP:80 may not be routable from host).
upstream moex_minikube_frontend {
    server MINIKUBE_IP:30080;
}

server {
    listen 80;
    server_name junibox;

    location / {
        proxy_pass http://moex_minikube_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
