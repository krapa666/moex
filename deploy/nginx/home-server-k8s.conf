# Nginx reverse-proxy for Minikube deployment on junibox.
#
# 1) Узнай IP minikube: `minikube ip`
# 2) Подставь его вместо MINIKUBE_IP ниже
# 3) Сохрани файл в /etc/nginx/conf.d/moex-k8s.conf

upstream moex_minikube_ingress {
    server MINIKUBE_IP:80;
}

server {
    listen 80;
    server_name junibox;

    location / {
        proxy_pass http://moex_minikube_ingress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
