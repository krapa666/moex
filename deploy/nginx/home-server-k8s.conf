# Nginx reverse-proxy template for Minikube deployment on junibox.
#
# Рекомендуемый способ генерации рабочего конфига:
#   sudo ./scripts/configure-nginx-k8s-proxy.sh --reload
#
# Скрипт подставляет доступные endpoint'ы вместо:
# - MINIKUBE_FRONTEND_ENDPOINT
# - MINIKUBE_PROMETHEUS_ENDPOINT
# - MINIKUBE_GRAFANA_ENDPOINT
# - MINIKUBE_LOKI_ENDPOINT

# Use frontend NodePort endpoint selected by script:
# - 127.0.0.1:30080 (preferred, via `kubectl port-forward` started by minikube-up)
# - MINIKUBE_IP:30080 fallback when localhost endpoint is unavailable.
upstream moex_minikube_frontend {
    server MINIKUBE_FRONTEND_ENDPOINT;
}

upstream moex_minikube_prometheus {
    server MINIKUBE_PROMETHEUS_ENDPOINT;
}

upstream moex_minikube_grafana {
    server MINIKUBE_GRAFANA_ENDPOINT;
}

upstream moex_minikube_loki {
    server MINIKUBE_LOKI_ENDPOINT;
}

server {
    listen 80;
    server_name junibox;

    location /prometheus/ {
        proxy_pass http://moex_minikube_prometheus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        proxy_pass http://moex_minikube_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /loki/ {
        rewrite ^/loki/(.*)$ /$1 break;
        proxy_pass http://moex_minikube_loki;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://moex_minikube_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
