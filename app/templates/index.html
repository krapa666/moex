<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOEX Price Lookup</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Текущая цена акции (MOEX)</h1>
      <p>Введите тикер акции Московской Биржи (рынок TQBR).</p>

      <div class="grid">
        <label>
          Тикер
          <input id="tickerInput" type="text" placeholder="Например, SBER" autocomplete="off" />
        </label>

        <label>
          Текущая цена
          <input id="priceOutput" type="text" readonly placeholder="—" />
        </label>
      </div>

      <p id="status" class="status"></p>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
