stages:
  - lint
  - test
  - build

default:
  tags:
    - home-docker
  interruptible: true

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

python-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -r backend/requirements-dev.txt
    - ruff check backend

python-tests:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -r backend/requirements-dev.txt
    - PYTHONPATH=backend pytest -q backend/tests

build-backend-image:
  stage: build
  image: docker:27.1.2
  services:
    - name: docker:27.1.2-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  script:
    - docker build -t moex-backend:ci ./backend

build-frontend-image:
  stage: build
  image: docker:27.1.2
  services:
    - name: docker:27.1.2-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  script:
    - docker build -t moex-frontend:ci ./frontend
